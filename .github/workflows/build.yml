name: Build and Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump_version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | tr -d '"')
          echo "Current version: $VERSION"
          
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          
          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"
          
          sed -i "s/version: $VERSION/version: $NEW_VERSION/" pubspec.yaml
          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add pubspec.yaml
          git commit -m "Bump version to $NEW_VERSION"
          git push
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.target }}
    needs: bump_version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: Android
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
            asset_name: app-release.apk
          - os: macos-latest
            target: iOS
            artifact_path: LIPerfume.ipa
            asset_name: LIPerfume.ipa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        if: matrix.target == 'Android'
        run: flutter build apk --release --dart-define=APP_VERSION=${{ needs.bump_version.outputs.new_version }}

      - name: Build iOS IPA (unsigned)
        if: matrix.target == 'iOS'
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r LIPerfume.ipa Payload
          rm -rf Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-Artifact
          path: |
            ${{ matrix.target == 'Android' && 'build/app/outputs/flutter-apk/app-release.apk' || '' }}
            ${{ matrix.target == 'iOS' && 'LIPerfume.ipa' || '' }}

  release:
    name: Create Release
    needs: [bump_version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump_version.outputs.new_tag }}
          name: Release ${{ needs.bump_version.outputs.new_version }}
          files: |
            artifacts/Android-Artifact/app-release.apk
            artifacts/iOS-Artifact/LIPerfume.ipa
          body: |
            Автоматическая сборка LI Perfume для Lixiang.

            ### Версия: ${{ needs.bump_version.outputs.new_version }}
            
            ### Артефакты:
            - 📱 **Android**: `app-release.apk`
            - 🍏 **iOS**: `LIPerfume.ipa` (unsigned)
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
